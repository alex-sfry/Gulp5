<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ED - keybindings</title>
    <!-- @if NODE_ENV='production' -->
    <link rel="stylesheet" href="css/main.min.css">
    <!-- @endif -->
    <!-- @if NODE_ENV='development' -->
    <link rel="stylesheet" href="css/main.css">
    <!-- @endif -->
</head>
<body>
    <div class="wrapper bg-gray-400">
        <form action="" id='fileForm' method='post' enctype='multipart/form-data'>
            <div>
                <label for="filesToUpload">File to upload:</label>
                <div class="input-cnt">
                    <input 
                        class='file-input'
                        type='file'
                        id='filesToUpload'
                        name='filesToUpload'
                        accept='.binds'
                    >
                    <span class="file-name">No file chosen</span>
                    <button type='submit' id='fileSubmitBtn'>Submit</button>
                </div>
            </div>
        </form>
        <div id='table'></div>
    </div>
    <!-- @if NODE_ENV='production' -->
    <script type="module" src="js/main.min.js"></script>
    <!-- @endif -->
    <!-- @if NODE_ENV='development' -->
    <script type="module" src="js/main.js"></script>
    <!-- @endif -->
</body>
</html>
